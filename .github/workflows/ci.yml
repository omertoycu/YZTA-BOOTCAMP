name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portfoyai
          POSTGRES_PASSWORD: portfoyai
          POSTGRES_DB: portfoyai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfoyai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # DATABASE_URL: uygulamanın bağlandığı kısıtlı rol (RLS'in gerçekten
      #   test edilebilmesi için superuser OLMAMALI, bkz. migration 0002).
      # MIGRATIONS_DATABASE_URL: alembic upgrade için superuser bağlantısı.
      DATABASE_URL: postgresql+psycopg2://portfoyai_app:portfoyai_app@localhost:5432/portfoyai_test
      MIGRATIONS_DATABASE_URL: postgresql+psycopg2://portfoyai:portfoyai@localhost:5432/portfoyai_test
      AUTH_DATABASE_URL: postgresql+psycopg2://portfoyai_auth:portfoyai_auth@localhost:5432/portfoyai_test
      PUBLIC_DATABASE_URL: postgresql+psycopg2://portfoyai_public:portfoyai_public@localhost:5432/portfoyai_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2 \
            libffi-dev shared-mime-info fonts-liberation
          sudo apt-get install -y --no-install-recommends libgdk-pixbuf-2.0-0 \
            || sudo apt-get install -y --no-install-recommends libgdk-pixbuf2.0-0

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app

      - name: Run tests
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
