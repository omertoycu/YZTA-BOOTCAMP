name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portfoyai
          POSTGRES_PASSWORD: portfoyai
          POSTGRES_DB: portfoyai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfoyai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://portfoyai:portfoyai@localhost:5432/portfoyai_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app

      - name: Run tests
        run: pytest -v
