services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfoyai
      POSTGRES_PASSWORD: portfoyai
      POSTGRES_DB: portfoyai
    ports:
      - "5432:5432"
    volumes:
      - portfoyai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoyai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      # Uygulama, RLS'in gerçekten uygulanabilmesi için superuser OLMAYAN kısıtlı
      # bir rolle bağlanır (bkz. alembic/versions/0002_app_role_least_privilege.py).
      # Postgres superuser'ları RLS'yi FORCE ile bile atlar.
      DATABASE_URL: postgresql+psycopg2://portfoyai_app:portfoyai_app@postgres:5432/portfoyai
      MIGRATIONS_DATABASE_URL: postgresql+psycopg2://portfoyai:portfoyai@postgres:5432/portfoyai
      # Sadece /auth/register ve /auth/login: e-posta ile ofis bilinmeden kullanıcı
      # arama gerekir, bu yüzden BYPASSRLS'li ama sadece offices+users'a erişimi olan
      # dar yetkili bir rol (bkz. migration 0003).
      AUTH_DATABASE_URL: postgresql+psycopg2://portfoyai_auth:portfoyai_auth@postgres:5432/portfoyai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  portfoyai_pgdata:
