services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfoyai
      POSTGRES_PASSWORD: portfoyai
      POSTGRES_DB: portfoyai
    ports:
      - "5432:5432"
    volumes:
      - portfoyai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoyai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://portfoyai:portfoyai@postgres:5432/portfoyai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  portfoyai_pgdata:
